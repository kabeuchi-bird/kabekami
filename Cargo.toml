[package]
name = "kabekami"
version = "0.1.0"
edition = "2021"
description = "KDE Plasma wallpaper rotation tool with Variety-inspired BlurPad display mode"
license = "Apache-2.0"

[dependencies]
anyhow = "1"
dirs = "6"
hex = "0.4.3"
image = "0.25"
ksni = "0.3.4"
rand = "0.9"
serde = { version = "1", features = ["derive"] }
sha2 = "0.11.0"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "signal", "sync"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
lto = "thin"
codegen-units = 1
